<ion-header class="ion-no-border">
  <ion-toolbar class="main-nav-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" icon="chevron-back" mode="md"></ion-back-button>
    </ion-buttons>

    <ion-title>
      <div class="title-wrapper">
        <ion-icon [name]="headerIcon" [class]="headerIconClass"></ion-icon>
        <span>{{ pageTitle }}</span>
      </div>
    </ion-title>

    <ion-buttons slot="end">
      <ion-button routerLink="/home">
        <ion-icon slot="icon-only" name="home" class="home-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/favorites">
        <ion-icon slot="icon-only" name="heart" class="heart-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/movie-details/null">
        <ion-icon slot="icon-only" name="videocam" class="videoCam-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/cast-crew-details/null">
        <ion-icon slot="icon-only" name="star" class="star-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-toolbar *ngIf="showSearch">
    <div class="search-container">
      <ion-searchbar 
        placeholder="Search movies or people..." 
        [(ngModel)]="searchQuery"
        (keyup.enter)="searchMulti($event)" 
        mode="ios" 
        class="custom-searchbar">
      </ion-searchbar>
    </div>
  </ion-toolbar>
</ion-header>
