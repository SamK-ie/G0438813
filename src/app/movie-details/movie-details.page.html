<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title
      ><ion-icon name="videocam" class="videocam-icon"></ion-icon> Movie
      Details</ion-title
    >
    <ion-buttons slot="end">
      <ion-button routerLink="/home">
        <ion-icon name="home" class="home-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/favorites">
        <ion-icon name="heart" class="heart-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/movie-details/null">
        <ion-icon name="videocam" class="videocam-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/movie-credits">
        <ion-icon name="star" class="star-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form (submit)="onSearch()">
    <ion-item>
      <ion-label position="stacked">Search Movie Name</ion-label>
      <ion-input
        [(ngModel)]="searchQuery"
        name="searchQuery"
        placeholder="Enter movie name"
      ></ion-input>
    </ion-item>

    <ion-button expand="full" type="submit">SEARCH</ion-button>
  </form>

  <!-- MODE A: Movie Details -->
  <div *ngIf="!isHistoryMode && movie">
    <ion-card>
      <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" />
      <ion-card-header>
        <ion-card-title>{{ movie.title }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>{{ movie.overview }}</ion-card-content>
    </ion-card>
  </div>

  <!-- MODE B: Recently Viewed List -->
  <div *ngIf="isHistoryMode">
    <ion-list-header>
      <ion-label>Recently Viewed Movies</ion-label>
    </ion-list-header>

    <ion-item
      *ngFor="let m of recentMovies"
      [routerLink]="['/movie-details', m.id]"
      (click)="loadDetails(m.id); isHistoryMode = false"
    >
      <ion-thumbnail slot="start">
        <img [src]="'https://image.tmdb.org/t/p/w92' + m.poster_path" />
      </ion-thumbnail>
      <ion-label>
        <h2>{{ m.title }}</h2>
      </ion-label>
    </ion-item>

    <div *ngIf="recentMovies.length === 0" class="ion-padding ion-text-center">
      <p>No recently viewed movies. Start searching!</p>
    </div>
  </div>
</ion-content>
