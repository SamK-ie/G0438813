<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-icon name="star" class="star-icon"></ion-icon>
      Cast & Crew Details</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/home">
        <ion-icon name="home" class="home-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/favorites">
        <ion-icon name="heart" class="heart-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/movie-details/null">
        <ion-icon name="videocam" class="videocam-icon"></ion-icon>
      </ion-button>
      <ion-button (click)="openHistory()" class="star-button">
  <ion-icon name="star" class="star-icon"></ion-icon>
</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar 
    [(ngModel)]="searchQuery" 
    name="searchQuery"
    (ionInput)="onSearch()" 
    placeholder="Search cast & crew...">
  </ion-searchbar>

  <!-- Recently Viewed People Grid -->
  <div *ngIf="isSearchMode && !searchQuery">
    <h3 class="section-subtitle">Recently Viewed People</h3>
    <ion-grid>
      <ion-row>
        <ion-col size="4" *ngFor="let p of recentPeople">
          <div class="credit-grid-item" (click)="loadPerson(p.id)">
            <div class="credit-avatar-circle">
              <img [src]="p.profile_path ? 'https://image.tmdb.org/t/p/w185' + p.profile_path : 'https://ionicframework.com/docs/img/demos/avatar.svg'" />
            </div>
            <p class="credit-label-name">{{ p.name }}</p>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!-- Search Results List -->
  <div *ngIf="!isSearchMode && !searchQuery && person" class="person-container">
  <!-- Profile Header Section -->
  <div class="profile-header ion-padding-vertical">
    <div class="image-wrapper">
      <img [src]="'https://image.tmdb.org/t/p/w500' + person.profile_path" class="profile-poster" />
    </div>
    <h1 class="ion-text-center person-name">{{ person.name }}</h1>
    
    <ion-badge color="primary" mode="ios" *ngIf="person.known_for_department">
      {{ person.known_for_department }}
    </ion-badge>
  </div>

  <!-- Details Section -->
  <div class="bio-section">
  <h2 class="section-title">Biography</h2>
  
  <div [class.collapsed-bio]="!isBioExpanded" class="bio-content">
    <p *ngFor="let paragraph of getFormattedBio(person.biography)" class="bio-paragraph">
      {{ paragraph }}
    </p>
  </div>

  <ion-button fill="clear" (click)="toggleBio()">
    {{ isBioExpanded ? 'Show Less' : 'Read Full Bio' }}
  </ion-button>
</div>

  <!-- Filmography Section -->
  <div class="filmography-section ion-padding-bottom">
    <h2 class="section-title ion-padding-horizontal">Known For</h2>
    <div class="cast-scroll-wrapper">
      <div class="cast-card" *ngFor="let movie of videography" [routerLink]="['/movie-details', movie.id]">
        <div class="poster-container">
          <img [src]="movie.poster_path ? 'https://image.tmdb.org/t/p/w185' + movie.poster_path : 'assets/no-poster.png'" />
        </div>
        <div class="movie-info">
          <p class="movie-title">{{ movie.title }}</p>
          <p class="movie-year" *ngIf="movie.release_date">{{ movie.release_date | date:'yyyy' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
</ion-content>
