<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>
      <ion-icon name="home" class="home-icon"></ion-icon>
      G0438813
    </ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/home">
        <ion-icon name="home" class="home-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/favorites">
        <ion-icon name="heart" class="heart-icon"></ion-icon>
      </ion-button>
      <ion-button routerLink="/movie-details/null">
        <ion-icon name="videocam" class="videocam-icon"></ion-icon>
      </ion-button>
      <ion-button (click)="openHistory()">
        <ion-icon name="star" class="star-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollEvents]="true" (ionScroll)="handleScroll($event)">
  
  <div class="search-section ion-padding">
    <h2 class="search-title">Welcome to the Movie App</h2>
    <form (submit)="onSearch($event)">
      <ion-item line="none" class="custom-input-item">
        <ion-input [(ngModel)]="searchQuery" name="searchQuery" placeholder="Search for a movie by name..." clearInput="true" ngDefaultControl>
        </ion-input>
      </ion-item>
      <ion-button expand="full" type="submit" class="search-btn">SEARCH</ion-button>
    </form>
  </div>

  <div *ngIf="searchHistory.length > 0" class="ion-padding">
    <ion-label color="medium">Recent Searches:</ion-label>
    <div class="history-container">
      <ion-chip *ngFor="let item of searchHistory" (click)="searchQuery = item; onSearch()">
        <ion-label>{{ item }}</ion-label>
        <ion-icon name="time-outline"></ion-icon>
      </ion-chip>
    </div>
  </div>

  <ion-list-header>
    <ion-label class="section-header">{{ listTitle }}</ion-label>
  </ion-list-header>

  <ion-grid class="movie-grid" *ngIf="movies.length > 0">
    <ion-row>
      <ion-col size="4" *ngFor="let movie of movies" [routerLink]="['/movie-details', movie.id]">
        <div class="grid-poster-frame">
          <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w342' + movie.poster_path" />
          <div *ngIf="!movie.poster_path" class="grid-no-image">
            <ion-icon name="videocam"></ion-icon>
            <span>No Poster</span>
          </div>
        </div>
        <p class="main-text">{{ movie.title }}</p>
        <p class="sub-text" *ngIf="movie.release_date">{{ movie.release_date | date:'yyyy' }}</p>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-infinite-scroll (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more movies...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" *ngIf="showBackToTop">
    <ion-fab-button color="warning" (click)="scrollToTop()" size="small">
      <ion-icon name="arrow-up"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <div *ngIf="movies.length === 0 && searchQuery === ''" class="ion-text-center ion-padding">
    <p>Loading movies...</p>
  </div>
</ion-content>
